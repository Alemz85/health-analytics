name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metrics:
    name: metrics (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: metrics/requirements.txt
      - run: pip install -r metrics/requirements.txt pytest
      - run: python -m pytest metrics/tests/ -q

  ingest:
    name: ingest (deno test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test
        working-directory: supabase/functions/ingest

  app:
    name: app (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - run: npm run typecheck
        working-directory: app
      - run: npm run build
        working-directory: app
