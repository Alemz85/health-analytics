appId: com.healthanalytics.app
productName: Health Analytics
directories:
  buildResources: build
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
# asar stays enabled (electron-builder default). Packaging note: the main
# process resolves `app/.env` relative to __dirname, which inside a packaged
# app sits at Contents/Resources/app.asar/out/main — that relative path no
# longer reaches a real .env once packaged. This is a known limitation (not
# fixed here — see README); the app still launches and falls back to its
# designed DB-error state.
#
# chatctx IS shipped, via extraResources below, so packaged-app chat works:
# chat.ts resolves CHATCTX_DIR to process.resourcesPath/chatctx when
# app.isPackaged. The file list is explicit and deliberately excludes
# chatctx/.env — that file holds Supabase credentials and must never be
# bundled into a distributable; the packaged CLI instead relies on
# SUPABASE_URL / SUPABASE_SERVICE_KEY already present in the main process's
# env (see chatctx/db.py's os.environ fallback).
#
# The two .mjs contract files (recovery_plan_contract.mjs,
# workout_template_contract.mjs) are invoked by the agent as `node
# <file>.mjs` with CHATCTX_DIR as cwd — they only need to exist alongside the
# other chatctx files above, no special path handling.
#
# knowledge/ is a separate PRIVATE repo (github.com/Alemz85/health-knowledge)
# cloned at the repo root, gitignored here, sibling to chatctx/. The chat
# instructions (chatctx/modes/analysis.md) describe it as "cloned beside"
# chatctx and degrade gracefully if absent — so it's bundled to `knowledge`
# (sibling of `chatctx` under resourcesPath, matching chat.ts's
# process.resourcesPath/chatctx and the dev-mode ../knowledge relative path)
# straight from this machine's checkout at build time, filtered to drop its
# own nested .git/.DS_Store. This assumes `npm run dist:mac` is run from a
# checkout that has knowledge/ cloned (true for the owner's dev machine,
# which is the only place this app is ever packaged) — if a checkout lacks
# it, electron-builder fails the build rather than silently shipping without
# it; clone the private repo to ../knowledge (repo root) before packaging.
asar: true
extraResources:
  - from: ../chatctx/CLAUDE.md
    to: chatctx/CLAUDE.md
  - from: ../chatctx/db.py
    to: chatctx/db.py
  - from: ../chatctx/injuries.py
    to: chatctx/injuries.py
  - from: ../chatctx/goals.py
    to: chatctx/goals.py
  - from: ../chatctx/agent_log.py
    to: chatctx/agent_log.py
  - from: ../chatctx/gym.py
    to: chatctx/gym.py
  - from: ../chatctx/recovery_plan_contract.mjs
    to: chatctx/recovery_plan_contract.mjs
  - from: ../chatctx/workout_template_contract.mjs
    to: chatctx/workout_template_contract.mjs
  - from: ../chatctx/modes
    to: chatctx/modes
  - from: ../chatctx/.claude
    to: chatctx/.claude
  - from: ../knowledge
    to: knowledge
    filter:
      - '**/*'
      - '!.git{,/**/*}'
      - '!.DS_Store'
  # metrics/ ships so the "Recompute metrics" button (metricsJob.ts) can run
  # `python -m metrics.compute` from a packaged app — cwd is process.resourcesPath,
  # so metrics/ must land directly under Resources/ (a sibling of chatctx/knowledge
  # above), not nested under an "out" or "app" subdir. Requires the machine's
  # python3 to already have metrics/requirements.txt installed (true on the
  # owner's machine); metricsJob.ts's spawn-error handling reports a clear
  # "pip install -r metrics/requirements.txt" hint if it isn't.
  - from: ../metrics
    to: metrics
    filter:
      - '**/*'
      - '!**/__pycache__{,/**/*}'
      - '!tests{,/**/*}'
mac:
  icon: build/icon.icns
  identity: null
  category: public.app-category.healthcare-fitness
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
